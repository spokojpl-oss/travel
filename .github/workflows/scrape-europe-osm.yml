name: Scrape Europe OSM

on:
  workflow_dispatch:
    inputs:
      fill_empty_only:
        description: "Only regions flagged by coverage audit (recommended)"
        type: boolean
        default: true

jobs:
  scrape-europe:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Scrape Europe OSM + tag activities
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ inputs.fill_empty_only }}" = "true" ]; then
            pnpm run audit:osm -- --fill
          else
            pnpm run scrape:europe
          fi
